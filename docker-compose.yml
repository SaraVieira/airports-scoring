services:
  postgres:
    image: postgis/postgis:16-3.4
    volumes:
      - pg_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: airports
      POSTGRES_USER: airports
      POSTGRES_PASSWORD: airports-internal-only
    ports:
      # Bind to loopback only — reachable via SSH tunnel, not public.
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airports"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      google-scraper-1:
        condition: service_started
      google-scraper-2:
        condition: service_started
      google-scraper-3:
        condition: service_started
    environment:
      DATABASE_URL: postgres://airports:airports-internal-only@postgres:5432/airports
      API_KEY: ${API_KEY}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      GOOGLE_SCRAPER_URLS: http://google-scraper-1:8000,http://google-scraper-2:8000,http://google-scraper-3:8000
      HF_TOKEN: ${HF_TOKEN}
      OPENSKY_ID: ${OPENSKY_ID:-}
      OPENSKY_SECRET: ${OPENSKY_SECRET:-}
    expose:
      - "8080"

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: http://api:8080
        VITE_API_KEY: ${API_KEY}
    depends_on:
      - api
    expose:
      - "3000"
    environment:
      NODE_ENV: production

  google-scraper-1:
    build:
      context: .
      dockerfile: google-scraper.Dockerfile
    environment:
      USE_MONGODB: "false"
      MAX_REVIEWS: "1500"
      DOWNLOAD_IMAGES: "false"

  google-scraper-2:
    build:
      context: .
      dockerfile: google-scraper.Dockerfile
    environment:
      USE_MONGODB: "false"
      MAX_REVIEWS: "1500"
      DOWNLOAD_IMAGES: "false"

  google-scraper-3:
    build:
      context: .
      dockerfile: google-scraper.Dockerfile
    environment:
      USE_MONGODB: "false"
      MAX_REVIEWS: "1500"
      DOWNLOAD_IMAGES: "false"

volumes:
  pg_data:
